<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pitch Recorder">
<title>Pitch Recorder</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b64;
    --text3: #a0a09a;
    --ok: #2d7a3a;
    --ok-bg: #e8f5eb;
    --ok-border: #7bc88a;
    --ng: #c0392b;
    --ng-bg: #fdecea;
    --ng-border: #e88a83;
    --hold: #a06000;
    --hold-bg: #fef6e0;
    --hold-border: #f0c060;
    --blue: #185fa5;
    --blue-light: #e6f1fb;
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* Header */
  .app-header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .app-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .date-badge {
    font-size: 13px;
    color: var(--text2);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    outline: none;
    font-family: inherit;
    cursor: pointer;
  }

  /* Stats */
  .stats-row { display: flex; gap: 8px; }
  .stat-pill {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 10px;
    border: 0.5px solid var(--border);
  }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-dot.ok    { background: var(--ok); }
  .stat-dot.total { background: var(--blue); }
  .stat-label { font-size: 11px; color: var(--text2); }
  .stat-val { font-size: 15px; font-weight: 600; margin-left: auto; }
  .stat-val.ok    { color: var(--ok); }
  .stat-val.total { color: var(--blue); }

  /* Inning tabs */
  .inning-bar {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 0 16px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .inning-bar::-webkit-scrollbar { display: none; }
  .inn-tab {
    flex-shrink: 0;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    border: none;
    background: transparent;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .inn-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* Inning stats strip */
  .inning-stats {
    background: var(--surface2);
    border-bottom: 0.5px solid var(--border);
    padding: 6px 16px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .inning-stats-label { font-size: 12px; font-weight: 600; color: var(--text2); flex-shrink: 0; }
  .inning-stats-item { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .inning-stats-item .val { font-weight: 600; color: var(--text); }
  .inning-stats-item .val.ok { color: var(--ok); }

  /* Content */
  .content { padding: 12px 14px; }

  /* Batter card */
  .batter-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .batter-card-header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
    gap: 8px;
  }
  .batter-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--blue-light);
    color: var(--blue);
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .batter-name { font-size: 14px; font-weight: 500; flex: 1; }
  .batter-summary { font-size: 12px; color: var(--text2); }

  .pitches-area { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }

  .pitch-cell {
    width: 44px; height: 52px;
    border-radius: 8px;
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.08s;
    gap: 2px;
  }
  .pitch-cell:active { transform: scale(0.91); }
  .pitch-cell.ok   { background: var(--ok-bg);   border-color: var(--ok-border); }
  .pitch-cell.ng   { background: var(--ng-bg);   border-color: var(--ng-border); }
  .pitch-cell.hold { background: var(--hold-bg); border-color: var(--hold-border); }

  .pitch-idx { font-size: 10px; color: var(--text3); line-height: 1; }
  .pitch-cell.ok   .pitch-idx { color: #5a9e65; }
  .pitch-cell.ng   .pitch-idx { color: #c97a75; }
  .pitch-cell.hold .pitch-idx { color: #c09040; }
  .pitch-mark { font-size: 20px; line-height: 1; }
  .pitch-cell.ok   .pitch-mark { color: var(--ok); }
  .pitch-cell.ng   .pitch-mark { color: var(--ng); }
  .pitch-cell.hold .pitch-mark { color: var(--hold); }
  .pitch-cell.empty .pitch-mark { color: var(--text3); font-size: 14px; }

  .add-pitch-cell {
    width: 44px; height: 52px;
    border-radius: 8px;
    border: 1px dashed var(--border2);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text3);
    font-size: 20px;
    transition: all 0.1s;
  }
  .add-pitch-cell:active { background: var(--surface2); }

  /* Add batter */
  .add-batter-btn {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius-lg);
    border: 1px dashed var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.1s;
  }
  .add-batter-btn:active { background: var(--surface); }

  /* Footer actions */
  .footer-actions {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    position: sticky;
    bottom: 0;
  }
  .btn-secondary {
    flex: 1; padding: 12px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
  }
  .btn-secondary:active { background: var(--surface2); }
  .btn-primary {
    flex: 1; padding: 12px;
    border-radius: var(--radius);
    border: none;
    background: var(--blue);
    color: #fff;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .btn-primary:active { opacity: 0.8; }

  /* Modal (pitch mark) */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
    width: 100%;
    animation: slideUp 0.22s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-title { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 18px; color: var(--text); }
  .modal-subtitle { font-size: 13px; color: var(--text2); text-align: center; margin-top: -14px; margin-bottom: 18px; }
  .modal-options { display: flex; gap: 10px; margin-bottom: 14px; }
  .modal-opt {
    flex: 1; padding: 16px 8px;
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    background: var(--surface2);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .modal-opt:active { transform: scale(0.96); }
  .modal-opt.opt-ok   { background: var(--ok-bg);   border-color: var(--ok-border); }
  .modal-opt.opt-ng   { background: var(--ng-bg);   border-color: var(--ng-border); }
  .modal-opt.opt-hold { background: var(--hold-bg); border-color: var(--hold-border); }
  .modal-opt-icon { font-size: 28px; line-height: 1; }
  .modal-opt.opt-ok   .modal-opt-icon { color: var(--ok); }
  .modal-opt.opt-ng   .modal-opt-icon { color: var(--ng); }
  .modal-opt.opt-hold .modal-opt-icon { color: var(--hold); }
  .modal-opt-label { font-size: 12px; font-weight: 500; color: var(--text2); }
  .modal-opt.opt-ok   .modal-opt-label { color: var(--ok); }
  .modal-opt.opt-ng   .modal-opt-label { color: var(--ng); }
  .modal-opt.opt-hold .modal-opt-label { color: var(--hold); }
  .modal-cancel {
    width: 100%; padding: 13px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    font-size: 14px; cursor: pointer;
  }
  .modal-cancel:active { background: var(--border); }

  /* Inning picker modal */
  .picker-title {
    font-size: 15px; font-weight: 600; text-align: center;
    margin-bottom: 6px; color: var(--text);
  }
  .picker-hint {
    font-size: 12px; color: var(--text3); text-align: center;
    margin-bottom: 16px;
  }
  .picker-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .picker-num {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    font-size: 16px; font-weight: 600;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .picker-num:active { transform: scale(0.93); }
  .picker-num.used {
    background: var(--bg);
    color: var(--text3);
    border-color: var(--border);
    cursor: default;
    pointer-events: none;
  }
  .picker-num.current {
    background: var(--blue-light);
    color: var(--blue);
    border-color: var(--blue);
    font-weight: 700;
  }
  .picker-delete-btn {
    width: 100%; padding: 13px;
    border-radius: var(--radius);
    border: 0.5px solid var(--ng-border);
    background: var(--ng-bg);
    color: var(--ng);
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .picker-delete-btn:active { opacity: 0.75; }

  /* Delete batter */
  .batter-delete {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text3);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <span class="app-title">Pitch Recorder</span>
    <input type="date" class="date-badge" id="date-badge">
  </div>
  <div class="stats-row">
    <div class="stat-pill">
      <div class="stat-dot total"></div>
      <span class="stat-label">投球数</span>
      <span class="stat-val total" id="stat-total">0</span>
    </div>
    <div class="stat-pill">
      <div class="stat-dot ok"></div>
      <span class="stat-label">録画OK</span>
      <span class="stat-val ok" id="stat-ok">0</span>
    </div>
  </div>
</div>

<div class="inning-bar" id="inning-bar"></div>
<div class="inning-stats" id="inning-stats"></div>

<div class="content" id="content"></div>

<div class="footer-actions">
  <button class="btn-secondary" id="add-inning-btn">＋ 回を追加</button>
  <button class="btn-primary" id="export-btn">Excel 出力</button>
</div>

<!-- Pitch mark modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="modal-options">
      <div class="modal-opt opt-ok" onclick="setMark('o')">
        <span class="modal-opt-icon">○</span>
        <span class="modal-opt-label">録画OK</span>
      </div>
      <div class="modal-opt opt-ng" onclick="setMark('x')">
        <span class="modal-opt-icon">×</span>
        <span class="modal-opt-label">録画NG</span>
      </div>
      <div class="modal-opt opt-hold" onclick="setMark('d')">
        <span class="modal-opt-icon">△</span>
        <span class="modal-opt-label">保留</span>
      </div>
    </div>
    <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<!-- Inning picker modal -->
<div class="modal-overlay" id="picker-overlay">
  <div class="modal-sheet">
    <div class="picker-title" id="picker-title">イニングを選択</div>
    <div class="picker-hint" id="picker-hint">追加する回を選んでください</div>
    <div class="picker-grid" id="picker-grid"></div>
    <button class="picker-delete-btn" id="picker-delete-btn" onclick="deleteCurrentInning()">このイニングを削除</button>
    <button class="modal-cancel" onclick="closePicker()">キャンセル</button>
  </div>
</div>

<script>
// Date
const now = new Date();
const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
document.getElementById('date-badge').value = todayStr;

function getDateStr() {
  return document.getElementById('date-badge').value.replace(/-/g, '');
}

// State
function defaultBatters() {
  return [1, 2, 3].map(id => ({ id, pitches: ['','','','','','',''] }));
}

let state = { innings: [], cur: 0 };
let modalTarget = null;
let pickerMode = 'add'; // 'add' | 'edit'

// Helpers
function countPitches(innings) {
  let total = 0, ok = 0;
  innings.forEach(inn => inn.batters.forEach(b => b.pitches.forEach(p => {
    if (p === 'o' || p === 'x' || p === 'd') total++;
    if (p === 'o') ok++;
  })));
  return { total, ok };
}

// Render
function render() {
  renderTabs();
  renderInningStats();
  renderContent();
  updateStats();
  saveToStorage();
}

function renderTabs() {
  const bar = document.getElementById('inning-bar');
  bar.innerHTML = '';
  state.innings.forEach((inn, i) => {
    const tab = document.createElement('button');
    tab.className = 'inn-tab' + (i === state.cur ? ' active' : '');
    tab.textContent = inn.id + '回';
    tab.onclick = () => {
      if (i === state.cur) {
        openPicker('edit');
      } else {
        state.cur = i;
        render();
      }
    };
    bar.appendChild(tab);
  });
}

function renderInningStats() {
  const strip = document.getElementById('inning-stats');
  if (state.innings.length === 0) { strip.innerHTML = ''; return; }
  const inn = state.innings[state.cur];
  const { total, ok } = countPitches([inn]);
  strip.innerHTML = `
    <span class="inning-stats-label">${inn.id}回</span>
    <span class="inning-stats-item">投球数 <span class="val">${total}</span></span>
    <span class="inning-stats-item">録画OK <span class="val ok">${ok}</span></span>
  `;
}

function renderContent() {
  const area = document.getElementById('content');
  area.innerHTML = '';

  if (state.innings.length === 0) {
    area.innerHTML = '<p style="text-align:center;color:var(--text3);padding:48px 0;font-size:14px;">＋ 回を追加 からイニングを追加してください</p>';
    return;
  }

  const inn = state.innings[state.cur];

  inn.batters.forEach((batter, bi) => {
    const ok   = batter.pitches.filter(p => p === 'o').length;
    const ng   = batter.pitches.filter(p => p === 'x').length;
    const hold = batter.pitches.filter(p => p === 'd').length;
    const total = batter.pitches.length;

    const card = document.createElement('div');
    card.className = 'batter-card';

    const hdr = document.createElement('div');
    hdr.className = 'batter-card-header';
    hdr.innerHTML = `
      <div class="batter-num">${batter.id}</div>
      <span class="batter-name">${batter.id}番打者</span>
      <span class="batter-summary">○${ok} ×${ng} △${hold} / ${total}球</span>
      <div class="batter-delete" onclick="deleteBatter(${bi})">✕</div>
    `;
    card.appendChild(hdr);

    const pitchArea = document.createElement('div');
    pitchArea.className = 'pitches-area';

    batter.pitches.forEach((p, pi) => {
      const cls  = p === 'o' ? 'ok' : p === 'x' ? 'ng' : p === 'd' ? 'hold' : 'empty';
      const mark = p === 'o' ? '○' : p === 'x' ? '×' : p === 'd' ? '△' : '・';
      const cell = document.createElement('div');
      cell.className = 'pitch-cell ' + cls;
      cell.innerHTML = `<span class="pitch-idx">${pi+1}球</span><span class="pitch-mark">${mark}</span>`;
      cell.onclick = () => openModal(state.cur, bi, pi);
      pitchArea.appendChild(cell);
    });

    const addPitch = document.createElement('div');
    addPitch.className = 'add-pitch-cell';
    addPitch.textContent = '+';
    addPitch.onclick = () => { state.innings[state.cur].batters[bi].pitches.push(''); render(); };
    pitchArea.appendChild(addPitch);

    card.appendChild(pitchArea);
    area.appendChild(card);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-batter-btn';
  const nextId = inn.batters.length > 0 ? inn.batters[inn.batters.length-1].id + 1 : 1;
  addBtn.innerHTML = '<span style="font-size:18px">＋</span> ' + nextId + '番打者を追加';
  addBtn.onclick = () => { inn.batters.push({ id: nextId, pitches: ['','','','','','',''] }); render(); };
  area.appendChild(addBtn);
}

function updateStats() {
  const { total, ok } = countPitches(state.innings);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-ok').textContent = ok;
}

function deleteBatter(bi) {
  const inn = state.innings[state.cur];
  if (inn.batters.length <= 1) { alert('最低1人は必要です'); return; }
  if (confirm('この打者を削除しますか？')) { inn.batters.splice(bi, 1); render(); }
}

// Pitch mark modal
function openModal(ii, bi, pi) {
  modalTarget = { ii, bi, pi };
  const inn = state.innings[ii];
  const b = inn.batters[bi];
  document.getElementById('modal-title').textContent = inn.id + '回 · ' + b.id + '番打者';
  document.getElementById('modal-subtitle').textContent = (pi+1) + '球目';
  document.getElementById('modal-overlay').classList.add('open');
}

function setMark(val) {
  if (!modalTarget) return;
  const { ii, bi, pi } = modalTarget;
  state.innings[ii].batters[bi].pitches[pi] = val;
  closeModal();
  render();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalTarget = null;
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Inning picker
function openPicker(mode) {
  pickerMode = mode;
  const isEdit = mode === 'edit';
  document.getElementById('picker-title').textContent = isEdit ? 'イニングを編集' : 'イニングを選択';
  document.getElementById('picker-hint').textContent  = isEdit ? '変更先の回を選んでください' : '追加する回を選んでください';
  document.getElementById('picker-delete-btn').style.display = isEdit ? 'block' : 'none';

  const usedIds    = state.innings.map(inn => inn.id);
  const currentId  = isEdit && state.innings.length > 0 ? state.innings[state.cur].id : -1;

  const grid = document.getElementById('picker-grid');
  grid.innerHTML = '';
  for (let n = 1; n <= 20; n++) {
    const btn = document.createElement('button');
    btn.className = 'picker-num';
    btn.textContent = n;
    if (n === currentId) {
      btn.classList.add('current');
      btn.onclick = closePicker; // re-tap current → just close
    } else if (usedIds.includes(n)) {
      btn.classList.add('used');
    } else {
      btn.onclick = () => { isEdit ? changeInningId(n) : addInning(n); closePicker(); };
    }
    grid.appendChild(btn);
  }

  document.getElementById('picker-overlay').classList.add('open');
}

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('open');
}

document.getElementById('picker-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('picker-overlay')) closePicker();
});

function addInning(id) {
  state.innings.push({ id, batters: defaultBatters() });
  state.innings.sort((a, b) => a.id - b.id);
  state.cur = state.innings.findIndex(inn => inn.id === id);
  render();
  const bar = document.getElementById('inning-bar');
  if (bar.children[state.cur]) bar.children[state.cur].scrollIntoView({ behavior: 'smooth', inline: 'nearest' });
}

function changeInningId(newId) {
  state.innings[state.cur].id = newId;
  state.innings.sort((a, b) => a.id - b.id);
  state.cur = state.innings.findIndex(inn => inn.id === newId);
  render();
}

function deleteCurrentInning() {
  const inn = state.innings[state.cur];
  if (!confirm(`${inn.id}回を削除しますか？`)) return;
  state.innings.splice(state.cur, 1);
  state.cur = Math.min(state.cur, Math.max(0, state.innings.length - 1));
  closePicker();
  render();
}

// Add inning button
document.getElementById('add-inning-btn').addEventListener('click', () => openPicker('add'));

// Excel Export
document.getElementById('export-btn').addEventListener('click', () => {
  const holdCount = state.innings.reduce((sum, inn) =>
    sum + inn.batters.reduce((s, b) =>
      s + b.pitches.filter(p => p === 'd').length, 0), 0);
  if (holdCount > 0) {
    if (!confirm(`保留（△）が${holdCount}球残っています。\n保留はNG扱いで出力します。よろしいですか？`)) return;
  }

  const wb = XLSX.utils.book_new();
  const header = ['イニング内投球数', 'イニング内打者数', '打者内投球数', '投手', '動画有無', '動画ナンバー'];
  let clipNum = 1;

  state.innings.forEach(inn => {
    const rows = [header];
    let inningPitchNum = 0;
    inn.batters.forEach((b, bi) => {
      b.pitches.forEach((p, pi) => {
        if (p !== 'o' && p !== 'x' && p !== 'd') return;
        inningPitchNum++;
        const hasVideo = p === 'o' ? 1 : '';
        const clipName = p === 'o' ? 'C' + String(clipNum).padStart(4, '0') + '.MP4' : '';
        if (p === 'o') clipNum++;
        rows.push([inningPitchNum, bi + 1, pi + 1, '', hasVideo, clipName]);
      });
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, inn.id + '回');
  });

  XLSX.writeFile(wb, 'pitch_record_' + getDateStr() + '.xlsx');
});

// ── 離脱警告 ──────────────────────────────────────────
window.addEventListener('beforeunload', e => {
  if (state.innings.length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ── localStorage バックアップ ────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem('pitchRecorder', JSON.stringify({
      date: document.getElementById('date-badge').value,
      innings: state.innings,
      cur: state.cur
    }));
  } catch(_) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('pitchRecorder');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!Array.isArray(data.innings) || data.innings.length === 0) return false;
    state.innings = data.innings;
    state.cur = data.cur ?? 0;
    if (data.date) document.getElementById('date-badge').value = data.date;
    return true;
  } catch(_) { return false; }
}

// 起動時にバックアップから復元
loadFromStorage();

render();
</script>
</body>
</html>
